<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDF</title>

<style>
html, body {
    margin: 0;
    height: 100%;
}

iframe {
    width: 100%;
    height: 100vh;
    border: none;
}
</style>
</head>

<body>

<iframe id="pdfFrame"></iframe>

<script>
const params = new URLSearchParams(window.location.search);
const file = params.get('file');

if (file) {
    document.getElementById('pdfFrame').src = file;
} else {
    document.body.innerHTML =
        '<p style="font-family:Arial;padding:20px">PDF non spécifié.</p>';
}
</script>

</body>
</html>
